name: Django Backend CI Pipeline

on:
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-backend:
    name: Build & Test Django
    runs-on: ubuntu-latest
    
    # Points to the exact folder containing manage.py based on your screenshot
    defaults:
      run:
        working-directory: ./ims-backend/backend

    steps:
      - name: 🛑 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run Django Tests
        # This will automatically find and run the tests in your inventory_api/tests folder
        run: python manage.py test