name: Django Backend CI Pipeline

on:
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-backend:
    name: Build & Test Django
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db.postgres
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./ims-backend/backend

    steps:
      - name: 🛑 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run Django Tests
        env:
          SECRET_KEY: 'dummy-secret-key-for-github-actions'
          DEBUG: 'True'
          
          # Database Variables
          DB_NAME: 'test_db.postgres'
          DB_USER: 'test_user'
          DB_PASSWORD: 'test_password'
          DB_HOST: 'localhost'
          DB_PORT: '5432'
          
          # Cloudinary Variables
          CLOUDINARY_CLOUD_NAME: 'test_cloud_name'
          CLOUDINARY_API_KEY: 'test_api_key'
          CLOUDINARY_API_SECRET: 'test_api_secret'
          
        run: python manage.py test